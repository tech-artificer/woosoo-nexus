# EXCERPT: Updated docker-compose.yml with bi_processor DHI service
# Add this to the existing compose.yaml file

  # ── BI Processor (ETL for order reconciliation & drift detection) ────────
  # Security: Docker Hardened Image (nonroot, minimal, no package manager)
  # Schedule: Run daily via Docker scheduler or external cron
  # Purpose: Refresh materialized snapshots, detect drift, generate reports
  bi_processor:
    build:
      context: .
      dockerfile: Dockerfile.processor.dhi
    image: woosoo-nexus-bi_processor:latest
    pull_policy: build
    restart: "no"  # Manual/scheduled execution only; not persistent
    
    # Environment configuration for database connection
    env_file:
      - .env.docker
    
    environment:
      # Database connection parameters (from .env or override here)
      DB_DIALECT: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: bi_readonly
      DB_PASSWORD: ${DB_PASSWORD:-change_this}
      DB_NAME: krypton_woosoo
      
      # Python runtime configuration
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    
    # Volumes for reports and logs (persistent across runs)
    volumes:
      # Report output (JSON, CSV exports)
      - bi_reports:/app/reports:rw
      # Application logs
      - bi_logs:/app/logs:rw
    
    # Dependency: Wait for MySQL to be healthy
    depends_on:
      mysql:
        condition: service_healthy
    
    # Docker network (internal communication with mysql, no external exposure)
    networks:
      - woosoo
    
    # Security: Run as nonroot user (UID 1000)
    user: "1000:1000"
    
    # Security: Prevent privilege escalation (even if exploited)
    security_opt:
      - no-new-privileges:true
    
    # Security: Read-only root filesystem (prevents filesystem attacks)
    read_only: true
    
    # Temporary filesystems (writable, but ephemeral - lost on container stop)
    tmpfs:
      - /tmp
      - /home/app
    
    # Resource limits (prevent resource exhaustion attacks)
    mem_limit: 512m
    mem_reservation: 256m
    cpus: 0.5  # 50% of one CPU core max
    
    # Health check (overrides Dockerfile HEALTHCHECK)
    healthcheck:
      test: ["CMD", "python", "-c", "import pandas, mysql.connector, psycopg2; exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 5s

# ────────────────────────────────────────────────────────────────────────────
# Named volumes for persistent data
# Add these to the existing volumes section
volumes:
  bi_reports:
    driver: local
  bi_logs:
    driver: local

# ────────────────────────────────────────────────────────────────────────────
# USAGE EXAMPLES
# ────────────────────────────────────────────────────────────────────────────

# 1. Run full ETL (refresh + report generation):
#    docker compose run --rm bi_processor \
#      --refresh --report --output /app/reports/drift_report_$(date +%Y%m%d).json

# 2. Check specific order for drift issues:
#    docker compose run --rm bi_processor --order-id 19643

# 3. Get high-severity drift issues:
#    docker compose run --rm bi_processor --drift HIGH

# 4. View logs from previous run:
#    docker volume inspect woosoo_bi_logs
#    docker run -v woosoo_bi_logs:/logs alpine cat /logs/bi_refresh.log

# 5. Schedule with system cron (on Docker host):
#    0 2 * * * cd /path/to/woosoo-nexus && docker compose run --rm bi_processor \
#      --refresh --report --output /app/reports/drift_report_$(date +\%Y\%m\%d).json

# 6. Schedule with docker-compose timer (requires docker-compose v2.17+):
#    NOT AVAILABLE - Use system cron or Kubernetes CronJob instead
