services:
  bi-processor:
    image: bi-processor:dhi
    restart: unless-stopped
    container_name: bi-processor
    environment:
      DB_DIALECT: mysql
      DB_HOST: 192.168.100.7
      DB_PORT: 3308
      DB_USER: woosoo_pos
      DB_PASSWORD: password
      DB_NAME: krypton_woosoo
      PYTHONUNBUFFERED: 1
    volumes:
      - ./logs:/app/logs
      - ./reports:/app/reports
    user: "1000:1000"
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    mem_reservation: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
