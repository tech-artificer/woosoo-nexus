services:

  # ── Reverse proxy + TLS termination ──────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP → HTTPS redirect
      - "443:443"     # Woosoo Nexus admin panel + Reverb WebSocket
      - "4443:4443"   # Tablet Ordering PWA
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
      - .:/var/www/html:ro
    depends_on:
      - app
      - reverb
      - tablet-pwa
    networks:
      - woosoo

  # ── Laravel app (PHP-FPM) ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    env_file:
      - .env
      - .env.docker
    environment:
      REVERB_BROADCAST_HOST: "192.168.100.7"
    volumes:
      - .:/var/www/html
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini:ro
      - storage_data:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "-r", "if (!($$s=fsockopen('127.0.0.1',9000,$$e,$$m,3))) exit(1);fclose($$s);"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    mem_limit: 768m
    mem_reservation: 384m
    networks:
      - woosoo

  # ── Queue worker ──────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "redis", "--sleep=3", "--tries=1", "--timeout=30", "--max-jobs=250", "--max-time=900", "--memory=256"]
    env_file:
      - .env
      - .env.docker
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - woosoo

  # ── Task scheduler ────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    env_file:
      - .env
      - .env.docker
    volumes:
      - .:/var/www/html
      - storage_data:/var/www/html/storage
    depends_on:
      app:
        condition: service_healthy
    mem_limit: 512m
    mem_reservation: 256m
    memswap_limit: 768m
    networks:
      - woosoo

  # ── Reverb WebSocket server ───────────────────────────────────────────
  reverb:
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    restart: unless-stopped
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080", "--no-interaction"]
    env_file:
      - .env
      - .env.docker
    environment:
      REVERB_BROADCAST_HOST: "192.168.100.7"
    volumes:
      - .:/var/www/html
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - woosoo

  # ── Tablet Ordering PWA ───────────────────────────────────────────────
  # Expects tablet-ordering-pwa repo to be a sibling directory:
  #   parent/
  #   ├── woosoo-nexus/
  #   └── tablet-ordering-pwa/
  tablet-pwa:
    build:
      context: ../tablet-ordering-pwa
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_BROADCAST_CONNECTION: reverb
        NUXT_PUBLIC_REVERB_APP_ID: woosoo
        NUXT_PUBLIC_REVERB_APP_KEY: 5j7k3m9n2p4q8r1t
        NUXT_PUBLIC_REVERB_HOST: 192.168.100.7
        NUXT_PUBLIC_REVERB_PORT: "443"
        NUXT_PUBLIC_REVERB_SCHEME: https
        NUXT_PUBLIC_REVERB_PATH: /app
    pull_policy: build
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NUXT_PUBLIC_API_BASE_URL: https://${PUBLIC_HOST:-woosoo.local}/api
      NUXT_PUBLIC_BROADCAST_CONNECTION: reverb
      NUXT_PUBLIC_REVERB_APP_ID: ${REVERB_APP_ID:-woosoo}
      NUXT_PUBLIC_REVERB_APP_KEY: ${REVERB_APP_KEY}
      NUXT_PUBLIC_REVERB_HOST: ${PUBLIC_HOST}
      NUXT_PUBLIC_REVERB_PORT: 443
      NUXT_PUBLIC_REVERB_SCHEME: https
      NUXT_PUBLIC_REVERB_PATH: /app
      MAIN_API_URL: https://${PUBLIC_HOST}
      NUXT_PUBLIC_PUSHER_KEY: ${REVERB_APP_KEY}
      NUXT_PUBLIC_PUSHER_CLUSTER: mt1
      NUXT_PUBLIC_DEVICE_AUTH_PASSCODE: ${DEVICE_AUTH_PASSCODE:-}
    networks:
      - woosoo

  # ── MySQL ─────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    mem_limit: 640m
    mem_reservation: 384m
    command:
      - --max_connections=200
      - --wait_timeout=300
      - --interactive_timeout=300
      - --innodb_buffer_pool_size=256M
      - --innodb_log_buffer_size=16M
      - --innodb_flush_log_at_trx_commit=2
      - --innodb_flush_method=O_DIRECT
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-woosoo}
      MYSQL_USER: ${DB_USERNAME:-woosoo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_this_password}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - woosoo

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # maxmemory-policy: volatile-lru evicts TTL-keyed entries (Pulse buckets, sessions)
    # first; never evicts permanent queue/lock keys (no TTL).
    command: redis-server --appendonly yes --maxmemory 400mb --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    mem_reservation: 256m
    networks:
      - woosoo

volumes:
  mysql_data:
  redis_data:
  storage_data:

networks:
  woosoo:
    driver: bridge
