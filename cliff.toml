[changelog]
header = "# Changelog\n\nAll notable changes to this repo are documented here.\nFormat: Keep a Changelog; commits follow Conventional Commits.\n"
body = """
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {{ commit.message | upper_first }}{% endfor %}
{% endfor %}\n
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Tests" },
  { message = "^revert", group = "Reverts" },
  { message = "^chore|^build|^ci", group = "Chores" },
  { message = ".*", group = "Other" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "newest"
