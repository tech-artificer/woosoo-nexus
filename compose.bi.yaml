# Dedicated BI/testing compose stack.
# This file intentionally stays separate from the canonical application stack in compose.yaml.

services:
  # Optional: MySQL for testing BI views
  mysql-bi:
    image: mysql:8.0
    container_name: krypton-woosoo-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: krypton_woosoo
      MYSQL_USER: bi_user
      MYSQL_PASSWORD: bi_password
    ports:
      - "3306:3306"
    volumes:
      - ./krypton_woosoo_bi_views.sql:/docker-entrypoint-initdb.d/01-bi-views.sql
      - mysql_data:/var/lib/mysql
    networks:
      - krypton-woosoo-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: PostgreSQL for testing BI views
  postgres-bi:
    image: postgres:14
    container_name: krypton-woosoo-postgres
    environment:
      POSTGRES_PASSWORD: postgres_password
      POSTGRES_DB: krypton_woosoo
      POSTGRES_USER: bi_user
    ports:
      - "5432:5432"
    volumes:
      - ./krypton_woosoo_bi_views.sql:/docker-entrypoint-initdb.d/01-bi-views.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - krypton-woosoo-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bi_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Python ETL/Refresh Service (Cron-based)
  bi-processor:
    build:
      context: .
      dockerfile: Dockerfile.processor.dhi
    container_name: krypton-woosoo-bi-processor
    environment:
      DB_DIALECT: mysql  # or postgresql
      DB_HOST: mysql-bi   # or postgres-bi
      DB_USER: bi_user
      DB_PASSWORD: bi_password
      DB_NAME: krypton_woosoo
    volumes:
      - ./bi_processor.py:/app/bi_processor.py
      - ./requirements.txt:/app/requirements.txt
      - ./logs:/app/logs
      - ./reports:/app/reports
    networks:
      - krypton-woosoo-network
    depends_on:
      mysql-bi:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: Grafana Dashboard (for visualization)
  grafana:
    image: grafana/grafana:latest
    container_name: krypton-woosoo-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin_password
      GF_INSTALL_PLUGINS: grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - krypton-woosoo-network
    depends_on:
      - mysql-bi
    restart: unless-stopped

volumes:
  mysql_data:
  postgres_data:
  grafana_data:

networks:
  krypton-woosoo-network:
    driver: bridge
