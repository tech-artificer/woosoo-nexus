<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Woosoo Admin v2 — Packages & Categories</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;500;600;700;800&family=Kanit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ─────────────────────────────────────────────────────────────── */
:root {
  --bg0:#0d0b09;--bg1:#141210;--bg2:#1b1815;--bg3:#23201a;--bg4:#2b2720;
  --bdr1:#252220;--bdr2:#352f26;--bdr3:#463929;
  --fg0:#f2ebe0;--fg1:#c0b4a0;--fg2:#7e7264;--fg3:#524a3e;
  --accent:#F6B56D;--acch:#f9c48a;--accm:#2a1e0c;--accb:#3d2c14;--accfg:#1a1208;
  --green:#6ea868;--greenm:#182a17;--greenb:#253420;
  --red:#c94f40;--redm:#2a1210;--redb:#3a1e18;
  --amber:#c99540;--amberm:#2a1e0c;--amberb:#3a2c14;
  --blue:#7a9bc4;--bluem:#141e2c;--blueb:#1e2c3e;
  --font-d:'Raleway',sans-serif;--font-s:'Kanit',sans-serif;--font-m:'JetBrains Mono',monospace;
  --r-s:4px;--r-m:6px;--r-l:10px;--r-xl:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;border:0;}
html,body,#root{height:100%;}
body{background:var(--bg0);color:var(--fg0);font-family:var(--font-s);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased;}

/* ── LAYOUT ─────────────────────────────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden;}
.sidebar{width:222px;flex-shrink:0;background:var(--bg1);border-right:1px solid var(--bdr1);display:flex;flex-direction:column;padding:16px 10px 12px;overflow-y:auto;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{height:48px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--bdr1);background:var(--bg0);flex-shrink:0;}
.content{flex:1;overflow-y:auto;padding:20px 22px 60px;}

/* ── SIDEBAR ────────────────────────────────────────────────────────────── */
.logo{display:flex;align-items:center;gap:9px;padding:2px 8px 14px;border-bottom:1px solid var(--bdr1);margin-bottom:8px;}
.logo-mark{font-family:var(--font-d);font-size:15px;font-weight:800;letter-spacing:.04em;color:var(--fg0);text-transform:uppercase;}
.logo-sub{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:600;font-family:var(--font-d);}
.nav-label{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--fg3);font-weight:700;padding:10px 8px 3px;font-family:var(--font-d);}
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--r-m);color:var(--fg2);font-size:13px;font-weight:500;cursor:pointer;user-select:none;position:relative;transition:background .12s,color .12s;font-family:var(--font-s);}
.nav-item:hover{background:var(--bg2);color:var(--fg1);}
.nav-item.active{background:var(--accm);color:var(--accent);}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:7px;bottom:7px;width:2px;background:var(--accent);border-radius:0 2px 2px 0;}
.nav-item.dim{opacity:.35;cursor:not-allowed;pointer-events:none;}
.nav-badge{margin-left:auto;font-family:var(--font-m);font-size:10px;background:var(--accent);color:var(--accfg);padding:1px 6px;border-radius:99px;font-weight:600;}
.sb-footer{margin-top:auto;padding-top:12px;border-top:1px solid var(--bdr1);display:flex;align-items:center;gap:9px;}
.avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#c47650,#6b3622);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}

/* ── ATOMS ──────────────────────────────────────────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--bdr1);border-radius:var(--r-l);}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:99px;border:1px solid var(--bdr2);background:var(--bg3);color:var(--fg1);white-space:nowrap;font-family:var(--font-d);}
.pill.green{color:var(--green);background:var(--greenm);border-color:var(--greenb);}
.pill.red{color:var(--red);background:var(--redm);border-color:var(--redb);}
.pill.accent{color:var(--accent);background:var(--accm);border-color:var(--accb);}
.pill.blue{color:var(--blue);background:var(--bluem);border-color:var(--blueb);}
.pill.amber{color:var(--amber);background:var(--amberm);border-color:var(--amberb);}

.btn{display:inline-flex;align-items:center;gap:6px;height:30px;padding:0 11px;border-radius:var(--r-m);border:1px solid var(--bdr2);background:var(--bg3);color:var(--fg0);font:600 12px var(--font-d);cursor:pointer;white-space:nowrap;transition:background .1s;outline:none;letter-spacing:.02em;}
.btn:hover{background:var(--bg4);border-color:var(--bdr3);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accfg);}
.btn.primary:hover{background:var(--acch);}
.btn.danger{background:var(--redm);border-color:var(--redb);color:var(--red);}
.btn.danger:hover{background:var(--redb);}
.btn.ghost{background:transparent;border-color:transparent;}
.btn.ghost:hover{background:var(--bg3);border-color:var(--bdr1);}
.btn.sm{height:26px;font-size:11px;padding:0 9px;gap:5px;}
.btn.icon-only{padding:0;width:30px;justify-content:center;}
.btn.sm.icon-only{width:26px;}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none;}

.form-label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg2);font-weight:700;margin-bottom:5px;font-family:var(--font-d);}
.form-hint{font-size:10.5px;color:var(--fg3);margin-top:3px;line-height:1.5;}
.form-input{width:100%;height:32px;padding:0 10px;border-radius:var(--r-m);border:1px solid var(--bdr2);background:var(--bg0);color:var(--fg0);font:13px var(--font-s);outline:none;transition:border-color .12s;}
.form-input:focus{border-color:var(--accb);}
.form-input::placeholder{color:var(--fg3);}
.form-textarea{width:100%;padding:7px 10px;min-height:58px;border-radius:var(--r-m);border:1px solid var(--bdr2);background:var(--bg0);color:var(--fg0);font:13px var(--font-s);outline:none;resize:vertical;line-height:1.5;transition:border-color .12s;}
.form-textarea:focus{border-color:var(--accb);}
.form-textarea::placeholder{color:var(--fg3);}
.form-select{width:100%;height:32px;padding:0 10px;border-radius:var(--r-m);border:1px solid var(--bdr2);background:var(--bg0);color:var(--fg0);font:13px var(--font-s);outline:none;cursor:pointer;}

/* ── TOGGLE ─────────────────────────────────────────────────────────────── */
.tog{width:34px;height:19px;border-radius:99px;display:flex;align-items:center;padding:2px;cursor:pointer;transition:background .15s;flex-shrink:0;background:var(--bg4);outline:0;}
.tog.on{background:var(--accent);}
.tog-knob{width:15px;height:15px;border-radius:50%;background:#fff;transition:transform .15s;flex-shrink:0;pointer-events:none;}
.tog.on .tog-knob{transform:translateX(15px);}

/* ── MODAL ──────────────────────────────────────────────────────────────── */
.modal-wrap{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;animation:ovFade .18s ease;}
@keyframes ovFade{from{opacity:0}to{opacity:1}}
.modal{width:460px;max-height:84vh;background:var(--bg1);border:1px solid var(--bdr2);border-radius:var(--r-xl);display:flex;flex-direction:column;animation:modalIn .2s cubic-bezier(.22,.68,0,1.1);overflow:hidden;}
.modal.wide{width:560px;}
@keyframes modalIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-bottom:1px solid var(--bdr1);}
.modal-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:14px;}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;padding:13px 20px;border-top:1px solid var(--bdr1);}
.modal-title{font-family:var(--font-d);font-size:14px;font-weight:800;color:var(--fg0);}

/* ── TABLE HEADER ────────────────────────────────────────────────────────── */
.tbl-th{font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--fg3);font-weight:700;font-family:var(--font-d);}

/* ── PACKAGES V2 ─────────────────────────────────────────────────────────── */
.pkg-layout{display:flex;gap:16px;align-items:flex-start;}
.pkg-list{flex:1;min-width:0;}
.pkg-panel{width:344px;flex-shrink:0;position:sticky;top:0;}
.pkg-panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--bdr1);}
.pkg-panel-title{font-family:var(--font-d);font-size:13px;font-weight:800;color:var(--fg0);}
.pkg-panel-body{padding:15px;display:flex;flex-direction:column;gap:13px;max-height:calc(100vh - 192px);overflow-y:auto;}
.pkg-panel-foot{padding:12px 15px;border-top:1px solid var(--bdr1);display:flex;gap:8px;}

.pkg-list-head{display:flex;align-items:center;padding:8px 14px 8px 10px;border-bottom:1px solid var(--bdr1);}
.pkg-row{display:flex;align-items:center;gap:0;padding:10px 14px 10px 10px;border-bottom:1px solid var(--bdr1);cursor:pointer;transition:background .1s;}
.pkg-row:hover{background:var(--bg3);}
.pkg-row.selected{background:var(--accm);border-left:2px solid var(--accent);}
.pkg-row:last-child{border-bottom:0;}
.pkg-grip{display:flex;align-items:center;justify-content:center;width:26px;color:var(--fg3);flex-shrink:0;opacity:.45;}
.pkg-row:hover .pkg-grip,.pkg-row.selected .pkg-grip{opacity:1;color:var(--accent);}
.pkg-info{flex:1;min-width:0;margin-left:6px;}
.pkg-row-name{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--fg0);}
.pkg-row.selected .pkg-row-name{color:var(--accent);}
.pkg-row-desc{font-size:11.5px;color:var(--fg2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;}

/* Modifier picker */
.mod-scroll{max-height:148px;overflow-y:auto;border-radius:var(--r-m);border:1px solid var(--bdr2);background:var(--bg0);}
.mod-item{display:flex;align-items:center;gap:8px;padding:6px 10px;cursor:pointer;transition:background .1s;border-bottom:1px solid var(--bdr1);}
.mod-item:last-child{border-bottom:0;}
.mod-item:hover{background:var(--bg3);}
.mod-item input[type=checkbox]{accent-color:var(--accent);width:13px;height:13px;flex-shrink:0;cursor:pointer;}
.mod-name{font-size:12px;color:var(--fg1);font-family:var(--font-s);}
.mod-sub{font-family:var(--font-m);font-size:10px;color:var(--fg3);margin-left:3px;}

/* Selected modifier chips */
.mod-chips{display:flex;flex-wrap:wrap;gap:5px;min-height:20px;}
.mod-chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:600;padding:3px 5px 3px 9px;border-radius:99px;border:1px solid var(--accb);background:var(--accm);color:var(--accent);font-family:var(--font-d);white-space:nowrap;}
.mod-chip-x{cursor:pointer;opacity:.6;display:flex;align-items:center;padding:1px;}
.mod-chip-x:hover{opacity:1;}
.mod-empty{font-size:11.5px;color:var(--fg3);font-style:italic;}

/* ── CATEGORIES V2 ───────────────────────────────────────────────────────── */
.cat-head{display:flex;align-items:center;padding:8px 16px 8px 14px;border-bottom:1px solid var(--bdr1);}
.cat-row{display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bdr1);transition:background .1s;}
.cat-row:hover{background:var(--bg3);}
.cat-row:last-child{border-bottom:0;}
.cat-grip{color:var(--fg3);flex-shrink:0;opacity:.4;cursor:grab;}
.cat-row:hover .cat-grip{opacity:1;}
.cat-ord{font-family:var(--font-m);font-size:11px;color:var(--fg3);width:20px;text-align:center;flex-shrink:0;margin:0 6px;}
.cat-name{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--fg0);}
.cat-slug{font-family:var(--font-m);font-size:11px;color:var(--fg2);margin-top:1px;}

/* ── GUIDE ──────────────────────────────────────────────────────────────── */
.guide-card{padding:20px 22px;margin-bottom:14px;}
.guide-h{font-family:var(--font-d);font-size:14px;font-weight:800;color:var(--fg0);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.guide-step{display:flex;gap:12px;margin-bottom:9px;}
.guide-step:last-of-type{margin-bottom:0;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--accm);border:1px solid var(--accb);color:var(--accent);font-family:var(--font-m);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.guide-p{font-size:13px;color:var(--fg1);line-height:1.65;font-family:var(--font-s);}
.guide-tip{display:flex;align-items:flex-start;gap:8px;background:var(--accm);border:1px solid var(--accb);border-radius:var(--r-m);padding:9px 12px;margin-top:10px;}
.guide-tip-text{font-size:12px;color:var(--fg1);line-height:1.55;}
.sec-title{font-family:var(--font-d);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--fg3);font-weight:700;display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bdr1);}

/* ── PROMPT ─────────────────────────────────────────────────────────────── */
.prompt-card{padding:22px 26px;margin-bottom:14px;}
.prompt-h2{font-family:var(--font-d);font-size:13px;font-weight:800;color:var(--fg0);margin:18px 0 8px;display:flex;align-items:center;gap:7px;}
.prompt-h2:first-child{margin-top:0;}
.prompt-p{font-size:13px;color:var(--fg1);line-height:1.7;margin-bottom:8px;}
.prompt-code{display:block;background:var(--bg0);border:1px solid var(--bdr2);border-radius:var(--r-m);padding:11px 14px;font-family:var(--font-m);font-size:11.5px;color:var(--fg1);line-height:1.65;white-space:pre;overflow-x:auto;margin:8px 0;}
.prompt-file{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-m);font-size:11px;background:var(--bluem);border:1px solid var(--blueb);color:var(--blue);padding:2px 8px;border-radius:var(--r-s);}
.prompt-tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--accm);border:1px solid var(--accb);color:var(--accent);padding:2px 8px;border-radius:var(--r-s);}
.prompt-copy{display:inline-flex;align-items:center;gap:5px;cursor:pointer;padding:1px 7px;border-radius:var(--r-s);background:var(--bg3);border:1px solid var(--bdr2);font-size:11px;color:var(--fg2);font-family:var(--font-d);font-weight:600;transition:background .1s;}
.prompt-copy:hover{background:var(--bg4);color:var(--fg1);}
.prompt-copy.copied{color:var(--green);border-color:var(--greenb);}
.change-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr1);}
.change-row:last-child{border-bottom:0;}
.change-label{font-family:var(--font-d);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;background:var(--greenm);border:1px solid var(--greenb);color:var(--green);padding:2px 7px;border-radius:var(--r-s);white-space:nowrap;margin-top:1px;flex-shrink:0;}
.change-label.fix{background:var(--amberm);border-color:var(--amberb);color:var(--amber);}
.change-text{font-size:12.5px;color:var(--fg1);line-height:1.6;}

/* ── MISC ────────────────────────────────────────────────────────────────── */
.page-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;}
.page-title{font-family:var(--font-d);font-size:20px;font-weight:800;letter-spacing:-.01em;color:var(--fg0);}
.page-sub{font-size:12px;color:var(--fg2);margin-top:2px;}
.row{display:flex;align-items:center;}
.col{display:flex;flex-direction:column;}
.grow{flex:1;}
.g4{gap:4px;}.g6{gap:6px;}.g8{gap:8px;}.g10{gap:10px;}.g12{gap:12px;}.g16{gap:16px;}
.mono{font-family:var(--font-m);}

/* ── LIGHT THEME ─────────────────────────────────────────────────────────── */
[data-theme="light"]{
  --bg0:#fffaf5;--bg1:#f5f0e8;--bg2:#ffffff;--bg3:#faf5ee;--bg4:#f0e8da;
  --bdr1:#e8e0d4;--bdr2:#d8cec4;--bdr3:#c8baae;
  --fg0:#252525;--fg1:#4a4035;--fg2:#6b5d52;--fg3:#9a8878;
  --accm:#fdf0e2;--accb:#f0d4a8;
  --green:#16a34a;--greenm:#f0fdf4;--greenb:#bbf7d0;
  --red:#dc2626;--redm:#fef2f2;--redb:#fecaca;
  --blue:#2563eb;--bluem:#eff6ff;--blueb:#bfdbfe;
  --amber:#b45309;--amberm:#fffbeb;--amberb:#fde68a;
}
[data-theme="light"] .sidebar{background:hsl(20,5%,10%);border-right-color:rgba(255,255,255,.07);}
[data-theme="light"] .nav-item{color:#7e7264;}
[data-theme="light"] .nav-item.active{background:rgba(176,128,71,.18);color:#c99540;}
[data-theme="light"] .nav-item.active::before{background:#B08047;}
[data-theme="light"] .logo-mark{color:#f2ebe0;}
[data-theme="light"] .logo-sub{color:#F6B56D;}
[data-theme="light"] .nav-label{color:#524a3e;}
[data-theme="light"] .topbar{background:#ffffff;}
[data-theme="light"] .btn.primary{background:#FCD8BA;border-color:#f0c4a0;color:#252525;}
[data-theme="light"] .sb-footer{border-top-color:#252220;}
[data-theme="light"] .form-select{color-scheme:light;}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px;}
::-webkit-scrollbar-track{background:transparent;}
</style>
<script>(function(){var t=localStorage.getItem('nexus-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="admin-v2.jsx"></script>
