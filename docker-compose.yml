services:
  nginx:
    image: nginx:stable-alpine
    container_name: woosoo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/certs:/etc/nginx/certs:ro
    depends_on:
      - app
      - reverb
    restart: unless-stopped
    networks:
      - woosoo

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: woosoo-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - woosoo

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: woosoo-queue
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=1 --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - app
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - woosoo

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: woosoo-scheduler
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - app
      - mysql
      - redis
    restart: unless-stopped
    networks:
      - woosoo

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: woosoo-reverb
    working_dir: /var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - woosoo

  mysql:
    image: mariadb:11
    container_name: woosoo-mysql
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-woosoo}
      MYSQL_USER: ${DB_USERNAME:-woosoo}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_this_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_this_root_password}
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    networks:
      - woosoo

  redis:
    image: redis:7-alpine
    container_name: woosoo-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - woosoo

networks:
  woosoo:

volumes:
  mysql_data:
  redis_data:
