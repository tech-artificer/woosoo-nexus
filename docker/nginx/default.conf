server {
    listen 80;
    server_name woosoo.local;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;

    server_name woosoo.local;

    root /var/www/html/public;
    index index.php index.html;

    ssl_certificate     /etc/nginx/certs/woosoo.crt;
    ssl_certificate_key /etc/nginx/certs/woosoo.key;

    client_max_body_size 50M;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location = /tablet {
        return 301 /tablet/;
    }

    location ^~ /tablet/ {
        alias /var/www/html/public/tablet/;
        try_files $uri $uri/ /tablet/index.html;
    }

    location /app/ {
        proxy_pass http://reverb:8080/app/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location /apps/ {
        proxy_pass http://reverb:8080/apps/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";

        proxy_read_timeout 3600;
        proxy_send_timeout 3600;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;

        fastcgi_read_timeout 120;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
