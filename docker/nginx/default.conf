# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
map $host $canonical_host {
    default      woosoo.local;
    woosoo.local woosoo.local;
}

server {
    listen 80;
    server_name _;

    # Serve the CA cert over plain HTTP so devices can bootstrap trust
    # before they have a valid HTTPS connection to this server.
    # nginx already has the cert at /etc/nginx/certs/fullchain.pem — serve it directly.
    # NOTE: exact-match location = takes priority over location / redirect below.
    location = /woosoo-ca.crt {
        alias /etc/nginx/certs/fullchain.pem;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="woosoo-ca.crt"';
    }

    # Redirect everything else to HTTPS.
    # Must be inside location / (not a bare return) so the cert location above is matched first.
    location / {
        return 301 https://$canonical_host$request_uri;
    }
}

# ── Woosoo Nexus Admin Panel (port 443) ───────────────────────────────────
server {
    listen 443 ssl;
    server_name _;

    root  /var/www/html/public;
    index index.php;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header X-Frame-Options           "SAMEORIGIN";
    add_header X-Content-Type-Options    "nosniff";
    add_header X-XSS-Protection          "1; mode=block";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reverb WebSocket — must be matched before the PHP catch-all
    location ~ ^/app/ {
        proxy_pass         http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # CA cert download — also available over HTTPS for phones that get redirected here.
    location = /woosoo-ca.crt {
        alias /etc/nginx/certs/fullchain.pem;
        default_type application/x-x509-ca-cert;
        add_header Content-Disposition 'attachment; filename="woosoo-ca.crt"';
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        gzip_static on;
    }

    location ~ \.php$ {
        fastcgi_pass         app:9000;
        fastcgi_index        index.php;
        fastcgi_param        SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        # Pass real client IP so $request->ip() in Laravel resolves correctly.
        # TrustProxies middleware (proxies='*') uses these headers.
        fastcgi_param        HTTP_X_REAL_IP       $remote_addr;
        fastcgi_param        HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        include              fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size  16k;
        fastcgi_buffers      4 16k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# ── Tablet Ordering PWA (port 4443) ───────────────────────────────────────
server {
    listen 4443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;

    add_header X-Frame-Options        "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000" always;

    location / {
        proxy_pass         http://tablet-pwa:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
